<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AWS GenAI Multi-Test Mock Exam Trainer</title>
  <meta name="description" content="AWS GenAI 模擬試験トレーナー。Practice Test 1-5を切り替え、即採点と解説を確認できます。" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <div class="title-wrap">
        <h1 class="title">AWS GenAI Mock Exam Trainer</h1>
        <p class="subtitle">Practice Test 1-5 / Tap to answer / Immediate review</p>
      </div>
      <div class="chip" id="scoreChip">Score 0 / 0</div>
    </header>

    <section class="card">
      <div class="test-selector">
        <label for="testSelect">Practice Test</label>
        <select id="testSelect" aria-label="Practice test selector"></select>
      </div>

      <div class="meta">
        <div class="qnum" id="qnum">問題 1</div>
        <div class="chip" id="counter">1 / 1</div>
      </div>

      <div class="progress-wrap">
        <div class="progress"><div id="progressBar"></div></div>
      </div>

      <article class="question" id="questionText"></article>
      <p class="question-meta" id="questionMeta"></p>
      <div class="option-list" id="options"></div>
      <section class="result" id="result"></section>

      <div class="actions">
        <button class="btn secondary" id="checkBtn" hidden disabled>回答をチェック</button>
        <button class="btn primary" id="nextBtn" disabled>次の問題へ</button>
        <button class="btn" id="restartBtn">このテストを最初から</button>
      </div>
      <p class="hint">単一選択はタップで即採点。複数選択は必要数を選んでから「回答をチェック」を押すと、解説・誤答理由・参考URLを確認できます。</p>
    </section>
  </main>

  <script src="./js/app.js" type="module"></script>
</body>
</html>
